services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: digital_twin_postgis_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: digital_twin
      POSTGRES_PASSWORD: DigitalTwin2024!
      POSTGRES_DB: digital_twin
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgis_data_dev:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - digital_twin_network_dev
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U digital_twin -d digital_twin" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 👇 ADICIONAR PGADMIN
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: digital_twin_pgadmin_dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@digitaltwin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8082:80"
    networks:
      - digital_twin_network_dev
    depends_on:
      - postgis
    volumes:
      - pgadmin_data_dev:/var/lib/pgadmin


volumes:
  postgis_data_dev:
  pgadmin_data_dev:
  ditto_mongodb_data_dev:
  ditto_data_dev:

networks:
  digital_twin_network_dev:
    driver: bridge
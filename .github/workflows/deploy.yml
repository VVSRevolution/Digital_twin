# .github/workflows/deploy.yml
name: Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Create credentials file
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
          echo "✅ credentials.json criado localmente"

      - name: Copy credentials and compose to server
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p ~/digital-twin"
          scp -o StrictHostKeyChecking=no -P ${{ secrets.SERVER_PORT }} credentials.json docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/digital-twin/
          echo "✅ Arquivos copiados para o servidor"

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd ~/digital-twin

            # 🔥 VERIFICA SE O REPOSITÓRIO EXISTE
            if [ ! -d ".git" ]; then
              echo "📦 Repositório não encontrado. Clonando..."
              git clone https://github.com/${{ github.repository }} .
              echo "✅ Clone concluído!"
            else
              echo "📦 Repositório encontrado. Atualizando..."
              git pull
              echo "✅ Git pull concluído!"
            fi

            # 🔥 VERIFICA SE AS PASTAS EXISTEM
            echo "📁 Verificando estrutura do projeto:"
            ls -la
            if [ -d "back" ]; then
              echo "✅ Pasta 'back' encontrada!"
            else
              echo "❌ Pasta 'back' NÃO encontrada!"
              exit 1
            fi
            if [ -d "front" ]; then
              echo "✅ Pasta 'front' encontrada!"
            else
              echo "❌ Pasta 'front' NÃO encontrada!"
              exit 1
            fi

            # 🔥 VERIFICA O credentials.json
            echo "🔍 Verificando credentials.json:"
            ls -la credentials.json
            echo "📄 Primeiras 3 linhas:"
            head -3 credentials.json

            # 🔥 SOBE OS CONTAINERS
            docker-compose down || echo "Nenhum container para parar"
            docker-compose up -d --build

            # 🔥 VERIFICA SE OS CONTAINERS SUBIRAM
            echo "🔍 Verificando containers rodando:"
            docker ps

            # 🔥 VERIFICA A VARIÁVEL NO CONTAINER
            echo "🔍 Verificando GOOGLE_APPLICATION_CREDENTIALS no container:"
            docker exec digital_twin_api printenv | grep GOOGLE_APPLICATION_CREDENTIALS || echo "❌ Variável não encontrada!"

            # 🔥 VERIFICA O ARQUIVO NO CONTAINER
            echo "🔍 Verificando arquivo de credenciais no container:"
            docker exec digital_twin_api ls -la /app/credentials.json || echo "❌ Arquivo não encontrado!"

            # 🔥 MOSTRA OS LOGS DO BACKEND
            echo "📋 Logs do backend (últimas 20 linhas):"
            docker logs digital_twin_api --tail 20
          EOF
# .github/workflows/deploy.yml
name: Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Create credentials file
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Create directory and copy files to server
        run: |
          # 🔥 Cria a pasta no servidor primeiro
          ssh -o StrictHostKeyChecking=no \
              -p ${{ secrets.SERVER_PORT }} \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "mkdir -p ~/digital-twin"

          # 🔥 Agora copia os arquivos
          scp -o StrictHostKeyChecking=no \
              -P ${{ secrets.SERVER_PORT }} \
              credentials.json \
              docker-compose.yml \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/digital-twin/

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no \
              -p ${{ secrets.SERVER_PORT }} \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd ~/digital-twin
            git pull || echo "Primeiro deploy, ignorando git pull"
            docker-compose down || echo "Nenhum container para parar"
            docker-compose up -d --build
            docker system prune -f
          EOF
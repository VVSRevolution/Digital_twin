name: 🚀 Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    name: 🚀 Deploy para Servidor
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: 🚀 Deploy
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd ~
          
            # REMOVER PERMISSÕES DOS ARQUIVOS PROBLEMÁTICOS
            chmod -R 755 digital-twin 2>/dev/null || true
            rm -rf digital-twin
          
            # CLONAR
            git clone https://github.com/${{ github.repository }} digital-twin
            cd digital-twin
          
            # CRIAR CREDENTIALS
            echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
            chmod 644 credentials.json
          
            # SE EXISTIR credentials.json NA PASTA BACK, REMOVER
            rm -f back/credentials.json
          
            # DOCKER SEM SUDO
            docker-compose down || echo "Nenhum container"
            docker-compose up -d --build
          
          EOF

      - name: ⏳ Aguardando containers
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "⏳ Aguardando container digital_twin_api..."
            MAX_ATTEMPTS=30
            ATTEMPT=0
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT + 1))
              if docker ps | grep -q "digital_twin_api" && docker ps | grep -q "Up"; then
                echo "✅ Container digital_twin_api está rodando! (após $ATTEMPT segundos)"
                break
              fi
              echo "⏳ Aguardando... ($ATTEMPT/$MAX_ATTEMPTS)"
              sleep 2
            done

            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "❌ Timeout: Container não subiu após $MAX_ATTEMPTS segundos"
              docker logs digital_twin_api --tail 20 || echo "Container não encontrado"
              exit 1
            fi
          EOF

      - name: 🔍 Verificando containers
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            docker ps
            echo "🔗 Backend: http://200.137.197.69:6789"
            echo "🔗 Frontend: http://200.137.197.69:8080"
          EOF
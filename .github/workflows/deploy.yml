# .github/workflows/deploy.yml
name: 🚀 Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    name: 🚀 Deploy para Servidor
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: 🚀 Deploy e Build
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd ~
            rm -rf digital-twin
            git clone https://github.com/${{ github.repository }} digital-twin
            cd digital-twin
            echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
            docker-compose down || echo "Nenhum container para parar"
            docker-compose up -d --build
          EOF

      - name: ⏳ Aguardando containers
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "⏳ Aguardando container digital_twin_api..."
            MAX_ATTEMPTS=30
            ATTEMPT=0
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT + 1))
              if docker ps | grep -q "digital_twin_api" && docker ps | grep -q "Up"; then
                echo "✅ Container digital_twin_api está rodando! (após $ATTEMPT segundos)"
                break
              fi
              echo "⏳ Aguardando... ($ATTEMPT/$MAX_ATTEMPTS)"
              sleep 2
            done

            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "❌ Timeout: Container não subiu após $MAX_ATTEMPTS segundos"
              docker logs digital_twin_api --tail 20 || echo "Container não encontrado"
              exit 1
            fi
          EOF

      - name: 🔍 Verificando containers
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "🔍 Containers rodando:"
            docker ps
          EOF

      - name: 🔍 Verificando GOOGLE_APPLICATION_CREDENTIALS
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "🔍 Verificando GOOGLE_APPLICATION_CREDENTIALS no container:"
            docker exec digital_twin_api printenv | grep GOOGLE_APPLICATION_CREDENTIALS || echo "❌ Variável não encontrada!"
          EOF

      - name: 📋 Logs do backend
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "📋 Logs do backend (últimas 20 linhas):"
            docker logs digital_twin_api --tail 20
          EOF